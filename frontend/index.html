<!DOCTYPE html>
<html>
<head>
  <title>Cloud App Catalog</title>
  <style>
    body { font-family: Arial; text-align: center; }
    input, button { margin: 5px; padding: 8px; }
  </style>
</head>
<body>

<h1>☁️ Cloud App Catalog</h1>

<input id="name" placeholder="App Name">
<input id="category" placeholder="Category">
<input id="version" placeholder="Version">

<button onclick="addApp()">Add App</button>

<h2>Apps</h2>
<ul id="list"></ul>

<script>
const API = "https://cloud-backend-ht80.onrender.com"; // 🔥 YOUR BACKEND URL

async function loadApps() {
  const res = await fetch(API + "/apps");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(app => {
    const li = document.createElement("li");

    li.innerHTML = `
      <b>${app.name}</b> (${app.category}) - v${app.version}
      <button onclick="useApp('${app._id}')">Use</button>
      <button onclick="deleteApp('${app._id}')">Delete</button>
    `;

    list.appendChild(li);
  });
}

async function addApp() {
  const name = document.getElementById("name").value;
  const category = document.getElementById("category").value;
  const version = document.getElementById("version").value;

  await fetch(API + "/apps", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, category, version })
  });

  loadApps();
}

async function deleteApp(id) {
  await fetch(API + "/apps/" + id, {
    method: "DELETE"
  });

  loadApps();
}

async function useApp(id) {
  const res = await fetch(API + "/use/" + id, {
    method: "PUT"
  });

  const data = await res.json();

  alert("Recommended: " + data.map(a => a.name).join(", "));
}

loadApps();
</script>

</body>
</html>
